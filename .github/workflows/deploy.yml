name: Deploy to EC2

on:
  push:
    branches:
      - main  # Memicu deployment saat push ke branch main 

jobs:
  deploy:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v2 

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }} 

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@98.81.73.206 << 'EOF' 
          cd /var/www/web1/resto_profile 
          git pull origin main 
          sudo systemctl restart nginx 
          EOF
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}